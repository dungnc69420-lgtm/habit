spring.application.name=habit-api
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/habit_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT: replace secret with a 256-bit base64-encoded key in production
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# Google OAuth2: replace with your credentials from console.cloud.google.com
spring.security.oauth2.client.registration.google.client-id=585019512553-f515t455muhfdt81ufmh4tae61lrho2j.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend URL (used for OAuth2 redirects)
app.frontend-url=http://localhost:3000